name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      APP_PATH: ${{ secrets.PROD_APP_PATH }}
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_PORT: ${{ secrets.PROD_PORT }}
      PROD_USER: ${{ secrets.PROD_USER }}
      DEPLOY_SHA: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Compute next release version
        run: |
          git fetch --tags --force
          BASE_VERSION="$(node -p "require('./package.json').version")"
          LATEST_TAG="$(git tag -l 'v*' --sort=-version:refname | head -n 1)"

          if [ -n "${LATEST_TAG}" ]; then
            CURRENT_VERSION="${LATEST_TAG#v}"
          else
            CURRENT_VERSION="${BASE_VERSION}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT_VERSION}"
          PATCH="${PATCH:-0}"
          NEXT_PATCH=$((PATCH + 1))
          RELEASE_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"

          echo "VITE_APP_RELEASE=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare SSH
        shell: bash
        run: |
          DEPLOY_PORT="${PROD_PORT:-22}"
          echo "DEPLOY_PORT=${DEPLOY_PORT}" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.PROD_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy application code on server
        shell: bash
        run: |
          ssh -p "${DEPLOY_PORT}" "${PROD_USER}@${PROD_HOST}" <<EOF
          set -e
          cd "${APP_PATH}"
          git fetch --prune origin
          git rev-parse --verify "${DEPLOY_SHA}" >/dev/null 2>&1 || git fetch origin "${DEPLOY_SHA}"
          git reset --hard "${DEPLOY_SHA}"
          composer install --no-interaction --no-dev --prefer-dist --optimize-autoloader
          php artisan migrate --force
          php artisan storage:link || true
          php artisan optimize:clear
          php artisan config:cache
          php artisan view:cache
          php artisan event:cache
          php artisan queue:restart || true
          EOF

      - name: Upload built assets
        shell: bash
        run: |
          rsync -az --delete -e "ssh -p ${DEPLOY_PORT}" public/build/ "${PROD_USER}@${PROD_HOST}:${APP_PATH}/public/build/"

      - name: Publish release marker on server
        shell: bash
        run: |
          ssh -p "${DEPLOY_PORT}" "${PROD_USER}@${PROD_HOST}" <<EOF
          set -e
          cd "${APP_PATH}"
          printf '%s\n' "${RELEASE_TAG}" > storage/app/current-release.txt
          printf '%s\n' "${DEPLOY_SHA}" > storage/app/current-release-sha.txt
          EOF

      - name: Create and push release tag
        shell: bash
        run: |
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists locally."
          else
            git tag "${RELEASE_TAG}"
          fi
          git push origin "${RELEASE_TAG}"
